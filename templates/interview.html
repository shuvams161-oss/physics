{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 700px;">

    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-bottom: 20px;">
        <h3 style="margin: 0; font-size: 1.1rem; color: var(--text-secondary);">
            Position: <span style="color: var(--accent-indigo); font-weight: 700;">{{ role }}</span>
        </h3>

        <a href="/" style="color: var(--text-muted); text-decoration: none;">
            ✕ End Session
        </a>
    </div>
<form action="/interview?role={{ role }}" method="POST" enctype="multipart/form-data"
      style="margin-bottom: 15px;">
    <input type="file" name="resume" accept=".pdf,.txt">
    <button type="submit">Upload Resume 📄</button>
</form>
    <!-- CHAT BOX -->
    <div id="chat"
         style="height: 380px; overflow-y: auto; padding-right: 8px; margin-bottom: 24px; display: flex; flex-direction: column;">

        <div class="bot">
            <strong>🤖 Interviewer:</strong><br>
            <span style="display:inline-block;margin-top:4px;">
                {{ first_question }}
            </span>
        </div>

    </div>

    <!-- INPUT -->
    <div style="display: flex; flex-direction: column; gap: 12px;">
        <textarea id="answer"
                  placeholder="Type your answer..."
                  rows="3"
                  style="resize:none;"></textarea>

        <button id="send-btn" onclick="sendAnswer()">
            Submit Answer 🌟
        </button>

        <button onclick="finishInterview()"
                style="background: #ef4444;">
            Finish Interview 🏁
        </button>
    </div>

</div>

<!-- JS -->
<script>
function sendAnswer() {
    let answerBox = document.getElementById("answer");
    let chat = document.getElementById("chat");
    let btn = document.getElementById("send-btn");

    let answer = answerBox.value.trim();
    if (!answer) return;

    // lock UI
    answerBox.disabled = true;
    btn.disabled = true;
    btn.innerText = "Evaluating... ⏳";

    // user message
    let userDiv = document.createElement("div");
    userDiv.className = "user";
    userDiv.innerHTML = "<strong>🧑 You:</strong><br>" + escapeHTML(answer);
    chat.appendChild(userDiv);

    answerBox.value = "";
    chat.scrollTop = chat.scrollHeight;

    // send to backend
    fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({answer})
    })
    .then(res => res.json())
    .then(data => {

        let botDiv = document.createElement("div");
        botDiv.className = "bot";

        botDiv.innerHTML = `
            <strong>🤖 Interviewer:</strong><br><br>
            ⭐ Score: ${data.score}/10<br><br>
            ${escapeHTML(data.feedback)}<br><br>
            <b>Next Question:</b><br>
            ${escapeHTML(data.next_question)}
        `;

        chat.appendChild(botDiv);

        answerBox.disabled = false;
        btn.disabled = false;
        btn.innerText = "Submit Answer 🌟";

        chat.scrollTop = chat.scrollHeight;
    })
    .catch(err => {
        console.error(err);
        answerBox.disabled = false;
        btn.disabled = false;
        btn.innerText = "Submit Answer 🌟";
    });
}


// FINISH INTERVIEW
function finishInterview() {
    let chat = document.getElementById("chat");

    fetch("/finish", {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {

        let result = document.createElement("div");
        result.className = "bot";

        result.innerHTML = `
            <h3>🏁 FINAL RESULT</h3><br>
            ⭐ Final Score: ${data.final_score}/10<br>
            🧾 Verdict: ${data.verdict}<br><br>
            💪 Strengths: ${data.strengths}<br>
            ⚠️ Weaknesses: ${data.weaknesses}<br><br>
            📌 ${data.summary}
        `;

        chat.appendChild(result);
        chat.scrollTop = chat.scrollHeight;
    });
}


// escape HTML
function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, function(tag) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        };
        return map[tag];
    });
}
</script>

{% endblock %}
